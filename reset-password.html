<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set New Password | EVOEVE Admin</title>
  <link rel="icon" type="image/png" href="./webtop logo.png">
  <link rel="stylesheet" href="./style2.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-grid">
      <a class="brand" href="index.html">EVOEVE</a>
    </div>
  </header>

  <main>
    <section class="section login-hero">
      <div class="container">
        <div class="login-panel admin-login-panel hover-card">
          <span class="eyebrow">Email verified</span>
          <h1>Set a new password</h1>
          <p id="resetWaiting">Verifying your reset link…</p>

          <form class="login-form hidden" id="resetPasswordForm">
            <label for="newPassword">New password</label>
            <input type="password" id="newPassword" minlength="8" autocomplete="new-password" required />
            <label for="confirmPassword">Confirm password</label>
            <input type="password" id="confirmPassword" minlength="8" autocomplete="new-password" required />
            <button class="btn btn-primary" type="submit">Update password</button>
            <p class="auth-link-row">
              <a href="login.html">← Back to admin login</a>
            </p>
          </form>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/auth-helpers.js"></script>
  <script src="js/reset-password.js"></script>
</body>
</html>
